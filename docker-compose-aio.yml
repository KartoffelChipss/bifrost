services:
    bifrost:
        image: ghcr.io/4g0tt3nsou1/bifrost:latest
        container_name: bifrost
        restart: unless-stopped
        environment:
            DB_DIALECT: sqlite
            FLUXER_BOT_TOKEN_FILE: /root/.creds/bf_flux
            DISCORD_BOT_TOKEN_FILE: /root/.creds/bf_discord
            FLUXER_APPLICATION_ID: 1478333491047665698
            DISCORD_APPLICATION_ID: 1478331623853260892
            COMMAND_PREFIX: "%"
            CONFIG_PATH: /config
            DISCORD_HEALTH_PUSH_URL: https://status.sou1.dev/api/push
            DISCORD_HEALTH_PUSH_TOKEN_FILE: /root/.creds/bf_hc_discord
            FLUXER_HEALTH_PUSH_URL: https://status.sou1.dev/api/push
            FLUXER_HEALTH_PUSH_TOKEN_FILE: /root/.creds/bf_hc_flux
            NODE_ENV: development
            METRICS_PORT: "9091"
            DELETE_INVOCATION: "true"
        volumes:
            - bifrost:/config
            - /root/.creds/bf_flux:/root/.creds/bf_flux:ro
            - /root/.creds/bf_discord:/root/.creds/bf_discord:ro
            - /root/.creds/bf_hc_discord:/root/.creds/bf_hc_discord:ro
            - /root/.creds/bf_hc_flux:/root/.creds/bf_hc_flux:ro
        networks:
            - bifrost
            - npm

volumes:
    bifrost:

networks:
    bifrost:
        driver: bridge
    npm:
        external: true
        name: npm_default
